<!DOCTYPE html><html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite AI Study Whiteboard Pro</title>
  <style>
    body{margin:0;font-family:Arial;overflow:hidden}
    #toolbar{position:fixed;top:0;left:0;right:0;display:flex;gap:6px;flex-wrap:wrap;padding:8px;background:#fff;border-bottom:1px solid #ddd;z-index:10}
    button,input,select{border:1px solid #ccc;border-radius:8px;padding:6px}
    #toggleBtn{position:fixed;top:8px;right:8px;z-index:11}
    #canvasWrap{position:absolute;top:56px;left:0;right:0;bottom:0;overflow:hidden;background-size:20px 20px;background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px)}
    canvas{touch-action:none;display:block}
    .textBox,.note,.imageBox{position:absolute;min-width:100px;padding:8px;border-radius:10px}
    .note{background:#fff59d}
    .textBox{background:#fff;border:1px solid #ccc}
    .imageBox{background:#fff;border:1px solid #ccc;padding:4px}
    #aiPanel{position:fixed;right:10px;top:70px;width:260px;background:#fff;border:1px solid #ccc;border-radius:12px;padding:10px;display:none;z-index:12}
  </style>
</head>
<body>
<button id="toggleBtn" onclick="toggleToolbar()">Hide</button>
<div id="toolbar">
  <button onclick="tool='pen';brush='normal'">✏️ Pen</button>
  <button onclick="tool='pen';brush='airbrush'">🖌 Airbrush</button>
  <button onclick="tool='pen';brush='dip'">🖋 Dip Pen</button>
  <button onclick="tool='eraser'">🧽 Eraser</button>
  <button onclick="tool='select'">🖱 Select</button>
  <button onclick="shape='rect';tool='shape'">⬛ Box</button>
  <button onclick="shape='circle';tool='shape'">⚪ Circle</button>
  <button onclick="shape='line';tool='shape'">📏 Line</button>
  <button onclick="addText()">T Text</button>
  <button onclick="addNote()">🟨 Note</button>
  <input type="color" onchange="color=this.value" value="#000000" />
  <input type="range" min="1" max="40" value="3" onchange="size=this.value" />
  <button onclick="zoom(1.2)">➕</button>
  <button onclick="zoom(0.8)">➖</button>
  <button onclick="toggleAI()">🤖 AI</button>
  <button onclick="webSearch()">🌐 Search</button>
  <button onclick="document.getElementById('file').click()">📎 Upload</button>
  <button onclick="saveBoard()">💾 Save</button>
  <button onclick="clearBoard()">Clear</button>
  <input type="file" id="file" hidden accept="image/*,application/pdf" />
</div>
<div id="aiPanel">
  <b>AI Assistant</b>
  <p style="font-size:12px">Quick study helper</p>
  <input id="aiQ" placeholder="Ask topic" style="width:100%" />
  <button onclick="webSearch()" style="width:100%;margin-top:8px">Search Web</button>
</div>
<div id="canvasWrap"><canvas id="board"></canvas></div>
<script>
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let worldW=8000, worldH=8000, scale=1, offsetX=0, offsetY=0;
let tool='pen', shape='rect', color='#000000', size=3, drawing=false, brush='normal';
let sx=0, sy=0;
canvas.width=window.innerWidth;
canvas.height=window.innerHeight-56;
ctx.lineCap='round';ctx.lineJoin='round';
let bg=document.createElement('canvas');
bg.width=worldW; bg.height=worldH; let bctx=bg.getContext('2d');function render(){ ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.setTransform(scale,0,0,scale,offsetX,offsetY); ctx.drawImage(bg,0,0); } render();

function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return {x:(t.clientX-r.left-offsetX)/scale,y:(t.clientY-r.top-offsetY)/scale};}

canvas.onmousedown=canvas.ontouchstart=(e)=>{drawing=true;let p=pos(e);sx=p.x;sy=p.y;if(tool==='pen'||tool==='eraser'){bctx.beginPath();bctx.moveTo(sx,sy)}}; canvas.onmousemove=canvas.ontouchmove=(e)=>{ if(!drawing)return;let p=pos(e); if(tool==='pen'||tool==='eraser'){ bctx.globalAlpha=brush==='airbrush'?0.2:1; bctx.lineWidth=brush==='dip'?size*2:size; bctx.strokeStyle=tool==='eraser'?'white':color; bctx.lineTo(p.x,p.y);bctx.stroke();render(); } }; canvas.onmouseup=canvas.ontouchend=()=>{drawing=false;bctx.globalAlpha=1;saveAuto();};

let panning=false, panStart={x:0,y:0}; canvas.addEventListener('wheel',e=>{e.preventDefault(); zoom(e.deltaY<0?1.1:0.9);}); canvas.addEventListener('pointerdown',e=>{ if(tool==='select'){panning=true; panStart={x:e.clientX,y:e.clientY}; }}); canvas.addEventListener('pointermove',e=>{ if(panning){ offsetX += e.clientX-panStart.x; offsetY += e.clientY-panStart.y; panStart={x:e.clientX,y:e.clientY}; render(); }}); canvas.addEventListener('pointerup',()=>panning=false);

function zoom(f){scale*=f; render();} function clearBoard(){bctx.clearRect(0,0,worldW,worldH); render(); saveAuto();} function saveBoard(){localStorage.setItem('infiniteBoardPro', bg.toDataURL()); alert('Saved permanently on this browser');} function saveAuto(){localStorage.setItem('infiniteBoardPro', bg.toDataURL());} window.onload=()=>{let d=localStorage.getItem('infiniteBoardPro'); if(d){let img=new Image(); img.src=d; img.onload=()=>{bctx.drawImage(img,0,0); render();};}} function toggleToolbar(){let tb=document.getElementById('toolbar'); tb.style.display=tb.style.display==='none'?'flex':'none';} function toggleAI(){let a=document.getElementById('aiPanel'); a.style.display=a.style.display==='block'?'none':'block';} function webSearch(){let q=document.getElementById('aiQ')?.value||'study notes'; window.open('https://www.google.com/search?q='+encodeURIComponent(q),'_blank');} function addNote(){let d=document.createElement('div'); d.className='note'; d.contentEditable=true; d.innerText='New note'; d.style.left='60px'; d.style.top='100px'; document.body.appendChild(d); makeDrag(d);} function addText(){let d=document.createElement('div'); d.className='textBox'; d.contentEditable=true; d.innerText='Text'; d.style.left='100px'; d.style.top='150px'; document.body.appendChild(d); makeDrag(d);} function makeDrag(el){let ox=0,oy=0; el.onmousedown=(e)=>{ox=e.offsetX;oy=e.offsetY; document.onmousemove=(ev)=>{el.style.left=(ev.pageX-ox)+'px'; el.style.top=(ev.pageY-oy)+'px';}; document.onmouseup=()=>document.onmousemove=null;};}

document.getElementById('file').onchange=(e)=>{let f=e.target.files[0]; if(!f)return; if(f.type.startsWith('image/')){let rd=new FileReader(); rd.onload=(ev)=>{let img=new Image(); img.src=ev.target.result; img.onload=()=>{bctx.drawImage(img,200,200,400,300); render(); saveAuto();};}; rd.readAsDataURL(f);} else {window.open(URL.createObjectURL(f),'_blank');}} </script>

</body>
</html>
