<!DOCTYPE html>
<html>
<head>
  <title>AI Study Whiteboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      gap: 6px;
      padding: 8px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
    }

    button {
      padding: 7px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 8px;
      font-size: 12px;
    }

    canvas {
      flex: 1;
      border: 1px solid #ddd;
      touch-action: none;
    }

    .note {
      position: absolute;
      top: 120px;
      left: 50px;
      background: yellow;
      padding: 10px;
      border-radius: 10px;
      min-width: 80px;
      cursor: move;
    }

    #aiBox {
      position: fixed;
      right: 10px;
      top: 70px;
      width: 220px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      display: none;
    }

    #fileView {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 200px;
      max-height: 200px;
      border: 1px solid #ccc;
      background: white;
      overflow: auto;
    }
  </style>
</head>

<body>

<div id="toolbar">
  <button onclick="tool='pen'">✏️ Pen</button>
  <button onclick="tool='eraser'">🧽 Eraser</button>

  <button onclick="setColor('black')">Black</button>
  <button onclick="setColor('red')">Red</button>
  <button onclick="setColor('blue')">Blue</button>

  <button onclick="undo()">↩️ Undo</button>
  <button onclick="redo()">↪️ Redo</button>

  <button onclick="addNote()">🟨 Note</button>

  <button onclick="document.getElementById('imgInput').click()">🖼 Image</button>
  <button onclick="document.getElementById('pdfInput').click()">📄 PDF</button>

  <button onclick="toggleAI()">🤖 AI</button>
  <button onclick="webSearch()">🌐 Search</button>
  <button onclick="clearCanvas()">Clear</button>
</div>

<input type="file" id="imgInput" accept="image/*" hidden />
<input type="file" id="pdfInput" accept="application/pdf" hidden />

<canvas id="board"></canvas>

<div id="aiBox">
  <b>AI Assistant</b>
  <p style="font-size:12px;">(Demo mode)</p>
  <input placeholder="Ask..." style="width:100%; padding:5px;" />
  <button style="margin-top:5px; width:100%;">Ask</button>
</div>

<div id="fileView"></div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 60;

let drawing = false;
let tool = "pen";
let color = "black";

let history = [];
let redoStack = [];

function saveState(){
  history.push(canvas.toDataURL());
  if(history.length > 20) history.shift();
}

function restore(state){
  let img = new Image();
  img.src = state;
  img.onload = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);
  }
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", end);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchend", end);
canvas.addEventListener("touchmove", draw);

function getPos(e){
  return {
    x: e.clientX || e.touches[0].clientX,
    y: e.clientY || e.touches[0].clientY
  };
}

function start(e){
  drawing = true;
  ctx.beginPath();
  saveState();
  const p = getPos(e);
  ctx.moveTo(p.x, p.y);
}

function draw(e){
  if(!drawing) return;

  const p = getPos(e);

  ctx.lineWidth = tool === "eraser" ? 20 : 3;
  ctx.strokeStyle = tool === "eraser" ? "white" : color;

  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}

function end(){
  drawing = false;
  redoStack = [];
}

function setColor(c){ color = c; }

function undo(){
  if(history.length > 0){
    redoStack.push(history.pop());
    let last = history[history.length - 1];
    if(last) restore(last);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

function redo(){
  if(redoStack.length > 0){
    let state = redoStack.pop();
    history.push(state);
    restore(state);
  }
}

function clearCanvas(){
  saveState();
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// Sticky notes
function addNote(){
  const note = document.createElement("div");
  note.className = "note";
  note.contentEditable = true;
  note.innerText = "New Note";
  document.body.appendChild(note);

  let ox=0, oy=0;

  note.onmousedown = (e)=>{
    ox = e.offsetX;
    oy = e.offsetY;

    document.onmousemove = (e)=>{
      note.style.left = (e.pageX-ox)+"px";
      note.style.top = (e.pageY-oy)+"px";
    }

    document.onmouseup = ()=> document.onmousemove=null;
  }
}

// Image upload
document.getElementById("imgInput").onchange = function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(event){
    let img = new Image();
    img.src = event.target.result;
    img.onload = () => ctx.drawImage(img, 50, 50, 200, 200);
  }
  reader.readAsDataURL(file);
}

// PDF upload (simple view)
document.getElementById("pdfInput").onchange = function(e){
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  const div = document.getElementById("fileView");
  div.innerHTML = `<iframe src="${url}" width="100%" height="200px"></iframe>`;
}

// AI toggle (demo)
function toggleAI(){
  const box = document.getElementById("aiBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// Web search
function webSearch(){
  window.open("https://www.google.com/search?q=study+notes", "_blank");
}

// auto save
setInterval(()=>{
  localStorage.setItem("board", canvas.toDataURL());
},5000);

// load saved
window.onload = ()=>{
  let data = localStorage.getItem("board");
  if(data){
    let img = new Image();
    img.src = data;
    img.onload = ()=>ctx.drawImage(img,0,0);
  }
};
</script>

</body>
</html>
