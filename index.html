<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Whiteboard</title>
<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:white;
}

#toolbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:8px;
  background:white;
  border-bottom:1px solid #ddd;
  z-index:10;
}

button,input{
  padding:6px;
  border:1px solid #ccc;
  border-radius:8px;
}

canvas{
  display:block;
  margin-top:60px;
  background:white;
  touch-action:none;
}
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="tool='pen'">✏️ Pen</button>
  <button onclick="tool='eraser'">🧽 Eraser</button>
  <button onclick="toggleGrid()">#️⃣ Grid</button>
  <button onclick="clearBoard()">Clear</button>
  <input type="color" onchange="color=this.value" value="#000000">
  <input type="range" min="1" max="30" value="3" onchange="size=this.value">
</div>

<canvas id="board"></canvas>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 60;

ctx.lineCap = "round";
ctx.lineJoin = "round";

let drawing = false;
let tool = "pen";
let color = "#000000";
let size = 3;
let grid = false;

function drawGrid(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(grid){
    ctx.strokeStyle = "#eee";
    ctx.lineWidth = 1;

    for(let x=0; x<canvas.width; x+=50){
      ctx.beginPath();
      ctx.moveTo(x,0);
      ctx.lineTo(x,canvas.height);
      ctx.stroke();
    }

    for(let y=0; y<canvas.height; y+=50){
      ctx.beginPath();
      ctx.moveTo(0,y);
      ctx.lineTo(canvas.width,y);
      ctx.stroke();
    }
  }
}

drawGrid();

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;

  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function startDraw(e){
  e.preventDefault();
  drawing = true;

  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
}

function draw(e){
  e.preventDefault();
  if(!drawing) return;

  const p = getPos(e);

  ctx.lineWidth = size;
  ctx.strokeStyle = tool === "eraser" ? "white" : color;

  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function stopDraw(e){
  e.preventDefault();
  drawing = false;
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDraw);

canvas.addEventListener("touchstart", startDraw, { passive:false });
canvas.addEventListener("touchmove", draw, { passive:false });
canvas.addEventListener("touchend", stopDraw, { passive:false });

function toggleGrid(){
  grid = !grid;
  drawGrid();
}

function clearBoard(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
}
</script>

</body>
</html>
